<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>FinTrack UMKM - Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-sans">
    <nav class="bg-blue-800 text-white p-4 shadow-md mb-6">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold">FinTrack UMKM</h1>
            <div class="space-x-4">
                <button onclick="showSection('dashboard')" class="hover:underline">Dashboard</button>
                <button onclick="showSection('management')" class="hover:underline">Kelola Data & Input</button>
            </div>
        </div>
    </nav>

    <div class="container mx-auto px-4 pb-10">
        <section id="dashboard-section">
            <h2 class="text-2xl font-bold mb-4 text-gray-700">Ringkasan Hari Ini</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8 text-white">
                <div class="bg-green-500 p-6 rounded shadow-lg">
                    <p class="opacity-80 text-sm">PEMASUKAN HARI INI</p>
                    <h3 id="today-income" class="text-2xl font-bold">Rp 0</h3>
                </div>
                <div class="bg-red-500 p-6 rounded shadow-lg">
                    <p class="opacity-80 text-sm">PENGELUARAN HARI INI</p>
                    <h3 id="today-expense" class="text-2xl font-bold">Rp 0</h3>
                </div>
                <div class="bg-blue-600 p-6 rounded shadow-lg">
                    <p class="opacity-80 text-sm">LABA HARI INI</p>
                    <h3 id="today-profit" class="text-2xl font-bold">Rp 0</h3>
                </div>
            </div>
        </section>

        <section id="management-section" class="hidden">
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                
                <div class="space-y-8">
                    <div class="bg-white p-6 rounded shadow-md">
                        <h3 class="font-bold text-lg mb-4 text-blue-800 border-b pb-2">Catat Transaksi Baru</h3>
                        <form id="form-transaction" class="space-y-4">
                            <select id="t-tipe" class="w-full p-2 border rounded" required>
                                <option value="pemasukan">Pemasukan</option>
                                <option value="pengeluaran">Pengeluaran</option>
                            </select>
                            <input type="text" id="t-kategori" placeholder="Kategori (e.g. Makanan, Listrik)" class="w-full p-2 border rounded" required>
                            <input type="number" id="t-nominal" placeholder="Nominal (Rp)" class="w-full p-2 border rounded" required>
                            <input type="text" id="t-keterangan" placeholder="Keterangan" class="w-full p-2 border rounded">
                            <button type="submit" class="w-full bg-green-600 text-white py-2 rounded font-bold hover:bg-green-700">Simpan Transaksi</button>
                        </form>
                    </div>

                    <div class="bg-white p-6 rounded shadow-md">
                        <h3 class="font-bold text-lg mb-4 text-blue-800 border-b pb-2">Tambah Produk/Stok</h3>
                        <form id="form-product" class="space-y-4">
                            <input type="text" id="p-nama" placeholder="Nama Produk" class="w-full p-2 border rounded" required>
                            <div class="flex gap-2">
                                <input type="number" id="p-stok" placeholder="Stok" class="w-1/2 p-2 border rounded" required>
                                <input type="text" id="p-satuan" placeholder="Satuan (pcs/kg)" class="w-1/2 p-2 border rounded" required>
                            </div>
                            <input type="number" id="p-harga" placeholder="Harga Jual (Rp)" class="w-full p-2 border rounded" required>
                            <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded font-bold hover:bg-blue-700">Tambah Produk</button>
                        </form>
                    </div>
                </div>

                <div class="space-y-8">
                    <div class="bg-white p-6 rounded shadow-md">
                        <h3 class="font-bold mb-4">Semua Riwayat</h3>
                        <div id="full-transactions" class="max-h-60 overflow-y-auto space-y-2"></div>
                    </div>
                    <div class="bg-white p-6 rounded shadow-md">
                        <h3 class="font-bold mb-4">Daftar Stok</h3>
                        <div id="full-products" class="max-h-60 overflow-y-auto space-y-2"></div>
                    </div>
                </div>

            </div>
        </section>
    </div>

    <script>
        const API_URL = 'http://localhost:5000/api';

        function showSection(section) {
            document.getElementById('dashboard-section').classList.toggle('hidden', section !== 'dashboard');
            document.getElementById('management-section').classList.toggle('hidden', section !== 'management');
            section === 'dashboard' ? loadDashboard() : loadManagement();
        }

        // --- LOAD DATA ---
        async function loadDashboard() {
            const res = await fetch(`${API_URL}/dashboard/summary`);
            const data = await res.json();
            document.getElementById('today-income').innerText = 'Rp ' + data.pemasukan.toLocaleString();
            document.getElementById('today-expense').innerText = 'Rp ' + data.pengeluaran.toLocaleString();
            document.getElementById('today-profit').innerText = 'Rp ' + data.laba_bersih.toLocaleString();
        }

        async function loadManagement() {
            const resT = await fetch(`${API_URL}/transactions`);
            const transactions = await resT.json();
            document.getElementById('full-transactions').innerHTML = transactions.map(t => `
                <div class="flex justify-between items-center bg-gray-50 p-2 rounded border text-sm">
                    <span>${t.kategori} - <b>Rp ${t.nominal.toLocaleString()}</b></span>
                    <button onclick="deleteItem('transactions', ${t.id})" class="text-red-500 font-bold">X</button>
                </div>
            `).join('');

            const resP = await fetch(`${API_URL}/products`);
            const products = await resP.json();
            document.getElementById('full-products').innerHTML = products.map(p => `
                <div class="flex justify-between items-center bg-gray-50 p-2 rounded border text-sm">
                    <span>${p.nama_produk} (${p.stok} ${p.satuan})</span>
                    <button onclick="deleteItem('products', ${p.id})" class="text-red-500 font-bold">X</button>
                </div>
            `).join('');
        }

        // --- POST DATA ---
        document.getElementById('form-transaction').onsubmit = async (e) => {
            e.preventDefault();
            const data = {
                tipe: document.getElementById('t-tipe').value,
                kategori: document.getElementById('t-kategori').value,
                nominal: document.getElementById('t-nominal').value,
                keterangan: document.getElementById('t-keterangan').value
            };
            await fetch(`${API_URL}/transactions`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            e.target.reset();
            loadManagement();
        };

        document.getElementById('form-product').onsubmit = async (e) => {
            e.preventDefault();
            const data = {
                nama_produk: document.getElementById('p-nama').value,
                stok: document.getElementById('p-stok').value,
                harga: document.getElementById('p-harga').value,
                satuan: document.getElementById('p-satuan').value
            };
            await fetch(`${API_URL}/products`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            e.target.reset();
            loadManagement();
        };

        async function deleteItem(type, id) {
            if(confirm('Hapus data?')) {
                await fetch(`${API_URL}/${type}/${id}`, { method: 'DELETE' });
                loadManagement();
            }
        }

        loadDashboard();
    </script>
</body>
</html>
